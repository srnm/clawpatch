name: CodeQL

on:
  workflow_dispatch:
    inputs:
      profile:
        description: CodeQL profile to run
        required: false
        default: all
        type: choice
        options:
          - all
          - typescript
          - actions
  push:
    branches:
      - main
    paths:
      - ".github/codeql/**"
      - ".github/workflows/**"
      - "src/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig*.json"
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - ".github/codeql/**"
      - ".github/workflows/**"
      - "src/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig*.json"
  schedule:
    - cron: "23 7 * * 1"

concurrency:
  group: codeql-${{ github.event_name == 'workflow_dispatch' && github.run_id || github.event_name == 'pull_request' && github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.category }})
    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            category: typescript
            config_file: ./.github/codeql/codeql-typescript-security.yml
          - language: actions
            category: actions
            config_file: ./.github/codeql/codeql-actions-security.yml
    steps:
      - name: Checkout
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.profile == 'all' || inputs.profile == matrix.category }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Initialize CodeQL
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.profile == 'all' || inputs.profile == matrix.category }}
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          languages: ${{ matrix.language }}
          config-file: ${{ matrix.config_file }}

      - name: Analyze
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.profile == 'all' || inputs.profile == matrix.category }}
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          category: "/codeql/${{ matrix.category }}"
